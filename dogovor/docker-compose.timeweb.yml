services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dogovor-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    ports:
      - "127.0.0.1:8000:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_DOGOVOR_API_URL: ${NEXT_PUBLIC_DOGOVOR_API_URL}
    container_name: dogovor-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"
